<!DOCTYPE HTML>
<html>
 <head>
  <meta charset="utf-8">
  <title>Интерактивные таблицы</title>
 </head>
 <body>  
  <table width="100%" border="1" cellspacing="0" cellpadding="4">  
   <tr> 
    <th>&nbsp;</th><th>Игрок 1</th>
    <th>Игрок 2</th><th>Игрок 3</th>
   </tr>
   <tr> 
    <td>Раунд 1</td>
	<td><span class="dynamic"><img src="rock.png"><img src="scissors.png"><img src="paper.png"></span></td>
	<td><span class="dynamic"><img src="paper.png"><img src="rock.png"><img src="scissors.png"></span></td>
	<td><span class="dynamic"><img src="scissors.png"><img src="paper.png"><img src="rock.png"></span></td>
   </tr>
   <tr> 
    <td>Раунд 2</td>
	<td><span class="dynamic"><img src="rock.png"><img src="rock.png"><img src="scissors.png"></span></td>
	<td><span class="dynamic"><img src="paper.png"><img src="paper.png"><img src="rock.png"></span></td>
	<td><span class="dynamic"><img src="scissors.png"><img src="scissors.png"><img src="paper.png"></span></td>
   </tr>
   <tr> 
    <td>Раунд 3</td>
	<td><span class="dynamic"><img src="paper.png"><img src="scissors.png"><img src="rock.png"></span></td>
	<td><span class="dynamic"><img src="rock.png"><img src="paper.png"><img src="scissors.png"></span></td>
	<td><span class="dynamic"><img src="scissors.png"><img src="rock.png"><img src="paper.png"></span></td>
   </tr>
  </table>
 </body>
</html>

<script>

var elems = document.getElementsByClassName("dynamic"),
 trampInput = document.createElement("input");
 istdselect = false;
            trampInput.type = "text";
            trampInput.style.width = "128px";
            trampInput.addEventListener("blur", function() {
				let innerText = trampInput.value;
				innerText = innerText.replace( /К/gi, "<img src=\"rock.png\">" );
				innerText = innerText.replace( /Н/gi, "<img src=\"scissors.png\">" );
				innerText = innerText.replace( /Б/gi, "<img src=\"paper.png\">" );					
				trampInput.parentNode.innerHTML = innerText;
				istdselect = false;	
			}
            , false);
for (var i=0; i<elems.length; i++) {
    var el = elems[i];
    el.addEventListener("click", function() {
        if (istdselect) return;
		istdselect = true;
		let innerText = this.innerHTML;
		innerText = innerText.replace( /<img src=\"rock.png\">/gi, "К" );
		innerText = innerText.replace( /<img src=\"scissors.png\">/gi, "Н" );
		innerText = innerText.replace( /<img src=\"paper.png\">/gi, "Б" );		
        trampInput.value = innerText;
        this.innerHTML = "";
        this.appendChild(trampInput);
        trampInput.focus();
        trampInput.select()
		}.bind(el), false);
	};
	
</script>
